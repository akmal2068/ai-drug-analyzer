<!DOCTYPE html>
<html>

<head>
    <title>AI Drug Analyzer</title>
</head>

<body>
    <h2>Register</h2>
    <input id="reg_user" placeholder="Username">
    <input id="reg_email" placeholder="Email">
    <input id="reg_pass" type="password" placeholder="Password">
    <button onclick="register()">Register</button>

    <h2>Login</h2>
    <input id="login_email" placeholder="Email">
    <input id="login_pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <h2>Search Drug</h2>
    <input id="drug_name" placeholder="Drug Name">
    <button onclick="searchDrug()">Search</button>

    <pre id="result"></pre>

    <script>
        const BASE_URL = "http://127.0.0.1:5000";

        async function register() {
            await fetch(BASE_URL + "/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: reg_user.value,
                    email: reg_email.value,
                    password: reg_pass.value
                })
            });
            alert("Registered!");
        }

        async function login() {
            const res = await fetch(BASE_URL + "/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: login_email.value,
                    password: login_pass.value
                })
            });

            const data = await res.json();
            localStorage.setItem("token", data.token);
            alert("Logged in!");
        }

        async function searchDrug() {
            const res = await fetch(BASE_URL + "/drug-info", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + localStorage.getItem("token")
                },
                body: JSON.stringify({
                    drug: drug_name.value
                })
            });

            const data = await res.json();
            result.textContent = JSON.stringify(data, null, 2);
        }
    </script>
</body>

</html>
